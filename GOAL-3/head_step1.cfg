enable
configure terminal
!
! === REQ 01-02: Localized config ===
hostname HEAD
no ip domain-lookup
line con 0
 exec-timeout 60 0
line vty 0 4
 exec-timeout 60 0
!
! === REQ 03: HEAD has NO VRFs (common) ===
! === Trunk to BODY on Gi0/0/0 ===
interface GigabitEthernet0/0/0
 description TRUNK-TO-BODY
 no ip address
 no shutdown
!
! === Sub-interfaces for VLANs 12, 21, 14, 41 ===
interface GigabitEthernet0/0/0.12
 description VLAN12-BLUE-TO-BODY
 encapsulation dot1Q 12
 ip address 192.168.12.1 255.255.255.0
!
interface GigabitEthernet0/0/0.21
 description VLAN21-BLUE-TO-BODY
 encapsulation dot1Q 21
 ip address 192.168.21.1 255.255.255.0
!
interface GigabitEthernet0/0/0.14
 description VLAN14-GREEN-TO-BODY
 encapsulation dot1Q 14
 ip address 172.16.14.1 255.255.255.0
!
interface GigabitEthernet0/0/0.41
 description VLAN41-GREEN-TO-BODY
 encapsulation dot1Q 41
 ip address 172.16.41.1 255.255.255.0
!
! === Loopbacks on HEAD ===
interface Loopback8
 description Lo8-NETWORK-STATEMENT
 ip address 8.8.8.8 255.255.255.0
!
interface Loopback11
 description Lo11-HIDDEN-NOT-ANNOUNCED
 ip address 193.10.203.11 255.255.255.255
!
interface Loopback12
 description Lo12-REDISTRIBUTE-CONNECTED
 ip address 12.12.11.11 255.255.255.0
!
end
