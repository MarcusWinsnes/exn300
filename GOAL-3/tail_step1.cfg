enable
configure terminal
!
! === REQ 01-02: Localized config ===
hostname TAIL
no ip domain-lookup
line con 0
 exec-timeout 60 0
line vty 0 4
 exec-timeout 60 0
!
! === REQ 03: VRF definitions ===
vrf definition blue
 rd 100:2
 address-family ipv4
 exit-address-family
!
vrf definition green
 rd 200:2
 address-family ipv4
 exit-address-family
!
! === Trunk to BODY on Gi1/0/1 ===
interface GigabitEthernet1/0/1
 description TRUNK-TO-BODY
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan 23,45
 no shutdown
!
! === VLANs ===
vlan 23
 name BLUE-TAIL-BODY
vlan 45
 name GREEN-TAIL-BODY
!
! === SVIs in VRF blue ===
interface Vlan23
 description VLAN23-BLUE-TO-BODY
 vrf forwarding blue
 ip address 192.168.23.3 255.255.255.0
 no shutdown
!
! === SVIs in VRF green ===
interface Vlan45
 description VLAN45-GREEN-TO-BODY
 vrf forwarding green
 ip address 172.16.45.5 255.255.255.0
 no shutdown
!
! === Loopbacks ===
interface Loopback3
 description Loo3-BLUE
 vrf forwarding blue
 ip address 192.168.3.3 255.255.255.255
!
interface Loopback5
 description Loo5-GREEN
 vrf forwarding green
 ip address 172.16.5.5 255.255.255.255
!
end
