enable
configure terminal
!
! === REQ 01-02: Localized config ===
hostname BODY
no ip domain-lookup
line con 0
 exec-timeout 60 0
line vty 0 4
 exec-timeout 60 0
!
! === REQ 03: VRF definitions ===
vrf definition blue
 rd 100:1
 address-family ipv4
 exit-address-family
!
vrf definition green
 rd 200:1
 address-family ipv4
 exit-address-family
!
! === Trunk to HEAD on Gi1/0/1 ===
interface GigabitEthernet1/0/1
 description TRUNK-TO-HEAD
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan 12,14,21,41
 no shutdown
!
! === Trunk to TAIL on Gi1/0/2 ===
interface GigabitEthernet1/0/2
 description TRUNK-TO-TAIL
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan 23,45
 no shutdown
!
! === VLANs ===
vlan 12
 name BLUE-BODY-HEAD
vlan 21
 name BLUE-HEAD-BODY
vlan 23
 name BLUE-BODY-TAIL
vlan 14
 name GREEN-BODY-HEAD
vlan 41
 name GREEN-HEAD-BODY
vlan 45
 name GREEN-BODY-TAIL
!
! === SVIs in VRF blue ===
interface Vlan12
 description VLAN12-BLUE-TO-HEAD
 vrf forwarding blue
 ip address 192.168.12.2 255.255.255.0
 no shutdown
!
interface Vlan21
 description VLAN21-BLUE-TO-HEAD
 vrf forwarding blue
 ip address 192.168.21.2 255.255.255.0
 no shutdown
!
interface Vlan23
 description VLAN23-BLUE-TO-TAIL
 vrf forwarding blue
 ip address 192.168.23.2 255.255.255.0
 no shutdown
!
! === SVIs in VRF green ===
interface Vlan14
 description VLAN14-GREEN-TO-HEAD
 vrf forwarding green
 ip address 172.16.14.4 255.255.255.0
 no shutdown
!
interface Vlan41
 description VLAN41-GREEN-TO-HEAD
 vrf forwarding green
 ip address 172.16.41.4 255.255.255.0
 no shutdown
!
interface Vlan45
 description VLAN45-GREEN-TO-TAIL
 vrf forwarding green
 ip address 172.16.45.4 255.255.255.0
 no shutdown
!
! === Loopbacks ===
interface Loopback2
 description Loo2-BLUE
 vrf forwarding blue
 ip address 192.168.2.2 255.255.255.255
!
interface Loopback4
 description Lo4-GREEN
 vrf forwarding green
 ip address 172.16.4.4 255.255.255.255
!
end
