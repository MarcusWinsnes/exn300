enable
configure terminal
!
! === REQ 20-21: OSPF in VRF blue - area 1 stub ===
router ospf 1 vrf blue
 router-id 3.3.3.3
 area 1 stub
 network 192.168.23.0 0.0.0.255 area 1
 network 192.168.3.3 0.0.0.0 area 1
!
! === REQ 30-31: EIGRP in VRF green - stub ===
router eigrp GREEN
 address-family ipv4 vrf green autonomous-system 100
  network 172.16.45.0 0.0.0.255
  network 172.16.5.5 0.0.0.0
  eigrp router-id 5.5.5.5
  eigrp stub connected
  af-interface default
   no shutdown
  exit-af-interface
 exit-address-family
!
end
