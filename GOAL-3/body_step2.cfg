enable
configure terminal
!
! === REQ 10: Blue Body - summary null route ===
ip route vrf blue 192.168.0.0 255.255.0.0 Null0
!
! === REQ 11: Blue Body - two static paths to 193.10.203.11 for ECMP ===
ip route vrf blue 193.10.203.11 255.255.255.255 192.168.12.1
ip route vrf blue 193.10.203.11 255.255.255.255 192.168.21.1
!
! === REQ 12: Green Body - summary null route ===
ip route vrf green 172.16.0.0 255.240.0.0 Null0
!
! === REQ 20-22: OSPF in VRF blue ===
! BODY as ABR: Lo2 area 0, Vlan23 area 1 (stub)
! Redistribute BGP into OSPF, NOT vice versa
router ospf 1 vrf blue
 router-id 2.2.2.2
 area 1 stub
 redistribute bgp 65001 subnets
 network 192.168.2.2 0.0.0.0 area 0
 network 192.168.23.0 0.0.0.255 area 1
!
! === REQ 30-32: EIGRP in VRF green ===
router eigrp GREEN
 address-family ipv4 vrf green autonomous-system 100
  network 172.16.45.0 0.0.0.255
  network 172.16.4.4 0.0.0.0
  eigrp router-id 4.4.4.4
  redistribute bgp 65001 metric 1000000 1 255 1 1500
  af-interface default
   no shutdown
  exit-af-interface
 exit-address-family
!
end
